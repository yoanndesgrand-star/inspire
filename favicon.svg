<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1510"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4bc8a"/>
      <stop offset="50%" style="stop-color:#c9a96e"/>
      <stop offset="100%" style="stop-color:#e8d5b0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <!-- Subtle ring -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.3"/>
  <!-- Arabic text إلهام -->
  <text x="256" y="290" text-anchor="middle" font-family="'Traditional Arabic', 'Scheherazade New', 'Noto Naskh Arabic', 'Arabic Typesetting', serif" font-size="220" font-weight="bold" fill="url(#gold)" filter="url(#glow)" direction="rtl" unicode-bidi="bidi-override">إلهام</text>
  <!-- Small diamond ornament -->
  <rect x="250" y="390" width="12" height="12" fill="url(#gold)" opacity="0.5" transform="rotate(45 256 396)"/>
</svg>
